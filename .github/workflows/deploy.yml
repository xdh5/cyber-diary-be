name: Deploy Backend to Aliyun

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy Backend
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DIET_DATABASE_ID: ${{ secrets.NOTION_DIET_DATABASE_ID }}
        run: |
          echo "=== 开始部署后端 ==="
          echo "NOTION_API_KEY=$NOTION_API_KEY" > .deploy_env
          echo "NOTION_DIET_DATABASE_ID=$NOTION_DIET_DATABASE_ID" >> .deploy_env
          chmod 600 .deploy_env
          scp -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=120 .deploy_env ${SERVER_USER}@${SERVER_HOST}:/root/backend/.env
          scp -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=120 -r * ${SERVER_USER}@${SERVER_HOST}:/root/backend/
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=120 ${SERVER_USER}@${SERVER_HOST} 'set -e && cd /root/backend && mkdir -p /root/backend/data && docker build --progress=plain -t cyber-diary-backend . && if docker ps -a --format "{{.Names}}" | grep -q "^backend-server$"; then docker stop backend-server && docker rm -f backend-server; fi && docker run -d --name backend-server --restart unless-stopped -p 8000:8000 -v /root/backend/data:/app/data --env-file /root/backend/.env cyber-diary-backend && sleep 3 && curl -s http://localhost:8000/health || echo "服务可能尚未完全启动" && docker ps --filter name=backend-server'
          rm -f .deploy_env
          echo "=== 后端部署完成 ==="